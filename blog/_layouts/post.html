---
layout: default
---

<div class="container post-container">
    <div class="post-header">
        <h1><span class="gradient" color1="#1e3a8a" color2="#60a5fa">{{ page.title }}</span></h1>
        <div class="post-meta">
            <i class="fa fa-calendar"></i> {{ page.date | date: "%Y-%m-%d" }}
            {% for tag in page.tags %}
            <span class="post-tag"><i class="fa fa-tag"></i> {{ tag }}</span>
            {% endfor %}
        </div>
    </div>

    <div class="post-content">
        {{ content }}
    </div>

    <a href="{{ '/blog/' | relative_url }}" class="back-link link-underline">
        <i class="fa fa-arrow-left"></i> 返回博客列表
    </a>
</div>
