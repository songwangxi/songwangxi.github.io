<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的博客</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
    <link rel="stylesheet" href="../common.css">
    <link rel="stylesheet" href="https://cdn.staticfile.org/font-awesome/4.7.0/css/font-awesome.css">
    <style>
        /* 博客专用样式 - 仅覆盖内容区域 */
        .blog-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .blog-header {
            margin-bottom: 2rem;
        }
        .blog-header h1 {
            font-size: 2rem;
            margin-bottom: 0.2rem;
        }
        .blog-header .subtitle {
            color: #64748b;
            font-size: 1rem;
        }

        .post-item {
            padding: 1rem 0;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }
        .post-item:last-child {
            border-bottom: none;
        }
        .post-item .post-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: #1e293b;
            text-decoration: none;
        }
        .post-item .post-title:hover {
            color: #4f46e5;
        }
        .post-item .post-meta {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-top: 2px;
        }
        .post-item .post-meta i {
            margin-right: 4px;
        }
        .post-tag {
            display: inline-block;
            background: rgba(79,70,229,0.12);
            color: #4f46e5;
            padding: 0 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-left: 4px;
        }
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: #4f46e5;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .blog-container {
                padding: 1.2rem 1rem;
            }
            .blog-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- 导航栏（使用你现有的 navbar.js） -->
    <script src="../navbar.js"></script>

    <!-- 博客内容 -->
    <div class="container blog-container">
        <div class="blog-header">
            <h1><span class="gradient" color1="#1e3a8a" color2="#60a5fa">📝 我的博客</span></h1>
            <p class="subtitle">记录学习与生活的点滴</p>
        </div>

        <div id="postList">
            <!-- 文章列表由 JavaScript 动态生成 -->
        </div>
    </div>

    <script>
        // ========== 文章数据 ==========
        const posts = [
            {
                title: "Hello World！我的第一篇博客",
                date: "2026-06-23",
                tags: ["生活", "随想"],
                url: "/blog/posts/2026-06-23-hello-world.html"
            }
            // 新增文章在这里添加：
            // {
            //     title: "第二篇文章标题",
            //     date: "2026-06-24",
            //     tags: ["标签1", "标签2"],
            //     url: "/blog/posts/2026-06-24-article-title.html"
            // }
        ];

        // ========== 渲染文章列表 ==========
        function renderPosts() {
            const container = document.getElementById('postList');
            if (posts.length === 0) {
                container.innerHTML = '<p style="color: #94a3b8; padding: 1rem 0;">还没有文章，马上写第一篇！</p>';
                return;
            }

            // 按日期从新到旧排序
            const sorted = [...posts].sort((a, b) => b.date.localeCompare(a.date));

            container.innerHTML = sorted.map(post => `
                <div class="post-item">
                    <a href="${post.url}" class="post-title">${post.title}</a>
                    <div class="post-meta">
                        <i class="fa fa-calendar"></i> ${post.date}
                        ${post.tags.map(tag => `<span class="post-tag">#${tag}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        renderPosts();
    </script>

</body>
</html>
