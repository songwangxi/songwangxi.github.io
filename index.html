---
layout: default
title: 首页
---

<div class="container" style="max-width:800px;padding:2rem 1.5rem;">
  <div class="blog-header" style="text-align:center;margin-bottom:2.5rem;">
    <h1><span class="gradient" color1="#1e3a8a" color2="#60a5fa"><i class="fa fa-book"></i> 我的博客</span></h1>
    <p style="color:#64748b;"><i class="fa fa-pencil-square-o"></i> 记录学习与生活的点滴</p>
  </div>

  <div style="display:flex;flex-direction:column;gap:0.8rem;">
    {% for post in site.posts %}
      <div class="card card-tilt" style="padding:0.8rem 1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;">
        <a href="{{ post.url | relative_url }}" class="post-title" style="font-size:1rem;">{{ post.title }}</a>
        <span style="color:#94a3b8;font-size:0.8rem;white-space:nowrap;">
          <i class="fa fa-calendar"></i> {{ post.date | date: "%Y-%m-%d" }}
        </span>
      </div>
    {% endfor %}
  </div>
</div>
