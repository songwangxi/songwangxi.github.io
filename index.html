<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人网站</title>
    <style>
        /* ========== 现代化全局CSS样式 ========== */

/* 1. 基础重置与盒模型 */
*,
*::before,
*::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* 2. 平滑滚动与字体渲染 */
html {
  scroll-behavior: smooth;
  -webkit-text-size-adjust: 100%;
}

/* 3. 全局字体与颜色 */
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif;
  line-height: 1.7;
  color: #334155; /* 深灰蓝，比纯黑更柔和 */
  background-color: #f8fafc; /* 非常浅的蓝灰背景 */
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* 4. 媒体元素自适应 */
img, picture, video, canvas, svg {
  display: block;
  max-width: 100%;
  height: auto;
}

/* 5. 表单元素字体继承 */
input, button, textarea, select {
  font: inherit;
  color: inherit;
}

/* 6. 链接样式 */
a {
  color: #4f46e5; /* 靛蓝色 */
  text-decoration: none;
  transition: color 0.2s ease;
}

a:hover {
  color: #4338ca;
  text-decoration: underline;
}

/* 7. 标题通用样式 */
h1, h2, h3, h4, h5, h6 {
  line-height: 1.3;
  color: #1e293b;
  font-weight: 600;
}

h1 { font-size: 2.2rem; }
h2 { font-size: 1.8rem; }
h3 { font-size: 1.4rem; }

/* 8. 段落间距 */
p { margin-bottom: 1rem; }

/* 9. 列表样式重置 */
ul, ol {
  list-style: none;
}

/* 10. 简单工具类 */
.container {
  width: 100%;
  max-width: 900px;
  margin-left: auto;
  margin-right: auto;
  padding-left: 1.5rem;
  padding-right: 1.5rem;
}

.text-center { text-align: center; }
.mt-1 { margin-top: 0.5rem; }
.mt-2 { margin-top: 1rem; }
.mt-3 { margin-top: 2rem; }
    </style>
</head>
<body>
    <h1>👋 你好，世界！</h1>
    <a href="https://www.baidu.com">链接</a>
</body>
</html>
