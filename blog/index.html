<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的博客</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
    <link rel="stylesheet" href="../common.css">
    <link rel="stylesheet" href="https://cdn.staticfile.org/font-awesome/4.7.0/css/font-awesome.css">
    <style>
        .blog-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }
        .blog-header {
            margin-bottom: 2.5rem;
            text-align: center;
        }
        .blog-header h1 {
            font-size: 2.2rem;
            margin-bottom: 0.3rem;
        }
        .blog-header .subtitle {
            color: #64748b;
            font-size: 1rem;
        }
        .post-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }
        .post-card .post-excerpt {
            color: #475569;
            font-size: 0.9rem;
            line-height: 1.6;
            flex: 1;
            margin-bottom: 0.8rem;
        }
        .post-card .post-meta {
            color: #94a3b8;
            font-size: 0.8rem;
        }
        .post-card .post-meta i {
            margin-right: 4px;
        }
        .empty-state {
            text-align: center;
            color: #94a3b8;
            padding: 3rem 0;
            grid-column: 1 / -1;
        }
        .empty-state i {
            font-size: 3rem;
            color: #cbd5e1;
            margin-bottom: 1rem;
        }
        @media (max-width: 600px) {
            .blog-container {
                padding: 1.2rem 1rem;
            }
            .blog-header h1 {
                font-size: 1.6rem;
            }
            .post-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <script src="../navbar.js"></script>

    <div class="container blog-container">
        <div class="blog-header">
            <h1><span class="gradient" color1="#1e3a8a" color2="#60a5fa"><i class="fa fa-book"></i> 我的博客</span></h1>
            <p class="subtitle"><i class="fa fa-pencil-square-o"></i> 记录学习与生活的点滴</p>
        </div>

        <div class="post-grid" id="postGrid">
        </div>
    </div>

    <script>
        const posts = [
            {
                title: "Hello World！我的第一篇博客",
                file: "2026-06-23-hello-world"
            }
        ];

        function renderPosts() {
            const grid = document.getElementById('postGrid');

            if (posts.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div><i class="fa fa-book"></i></div>
                        <p>还没有文章，马上写第一篇！</p>
                    </div>
                `;
                return;
            }

            const sorted = [...posts].sort((a, b) => b.file.localeCompare(a.file));

            grid.innerHTML = sorted.map(post => `
                <div class="card post-card card-tilt">
                    <a href="post.html?post=${post.file}" class="post-title link-underline" style="font-size:1.15rem;font-weight:600;line-height:1.4;margin-bottom:0.5rem;color:#1e293b;">${post.title}</a>
                    <p class="post-excerpt">点击阅读全文...</p>
                    <div class="post-footer" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem;border-top:1px solid rgba(0,0,0,0.05);padding-top:0.8rem;margin-top:0.3rem;">
                        <span class="post-meta">
                            <i class="fa fa-calendar"></i> ${post.file.slice(0, 10)}
                        </span>
                    </div>
                    <div style="margin-top: 0.6rem; text-align: right;">
                        <a href="post.html?post=${post.file}" class="link-underline" style="color:#4f46e5;font-size:0.85rem;font-weight:500;">
                            阅读全文 <i class="fa fa-arrow-right"></i>
                        </a>
                    </div>
                </div>
            `).join('');
        }

        renderPosts();
    </script>

</body>
</html>
