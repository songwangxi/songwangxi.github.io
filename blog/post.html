<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的博客 - 文章</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
    <link rel="stylesheet" href="../common.css">
    <link rel="stylesheet" href="../blog.css">
    <link rel="stylesheet" href="https://cdn.staticfile.org/font-awesome/4.7.0/css/font-awesome.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

    <script src="../navbar.js"></script>

    <div class="container post-container">
        <div class="post-header" id="postHeader">
            <h1 id="postTitle">文章标题</h1>
            <div class="post-meta" id="postMeta">
                <i class="fa fa-calendar"></i> <span id="postDate">日期</span>
                <span id="postTags"></span>
            </div>
        </div>

        <div class="post-content" id="postContent">
            <p>加载中...</p>
        </div>

        <a href="/blog/" class="back-link link-underline"><i class="fa fa-arrow-left"></i> 返回博客列表</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const postFile = params.get('post');

        if (postFile) {
            const mdPath = `_posts/${postFile}.md`;

            fetch(mdPath)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('文章未找到');
                    }
                    return response.text();
                })
                .then(markdown => {
                    const htmlContent = marked.parse(markdown);
                    document.getElementById('postContent').innerHTML = htmlContent;

                    const lines = markdown.split('\n');
                    let title = '文章标题';
                    
                    for (let line of lines) {
                        if (line.startsWith('# ')) {
                            title = line.replace('# ', '');
                            document.title = title + ' - 我的博客';
                            document.getElementById('postTitle').innerText = title;
                            break;
                        }
                    }
                    
                    const dateMatch = postFile.match(/(\d{4}-\d{2}-\d{2})/);
                    if (dateMatch) {
                        document.getElementById('postDate').innerText = dateMatch[1];
                    }

                    const tagMatch = markdown.match(/tags:\s*\[(.*?)\]/);
                    if (tagMatch) {
                        const tags = tagMatch[1].split(',').map(t => t.trim());
                        document.getElementById('postTags').innerHTML = tags.map(tag => 
                            `<span class="post-tag"><i class="fa fa-tag"></i> ${tag}</span>`
                        ).join('');
                    }
                })
                .catch(error => {
                    document.getElementById('postContent').innerHTML = `
                        <p style="color: #ef4444;"><i class="fa fa-exclamation-circle"></i> 文章加载失败：${error.message}</p>
                    `;
                });
        } else {
            document.getElementById('postContent').innerHTML = `
                <p style="color: #94a3b8;"><i class="fa fa-info-circle"></i> 请指定要阅读的文章。</p>
            `;
        }
    </script>

</body>
</html>
