---
layout: default
---

<div class="container" style="max-width:800px;padding:2rem 1.5rem;">
    <div style="border-bottom:1px solid rgba(0,0,0,0.06);padding-bottom:1rem;margin-bottom:2rem;">
        <h1 style="font-size:2rem;margin-bottom:0.3rem;"><span class="gradient" color1="#1e3a8a" color2="#60a5fa">{{ page.title }}</span></h1>
        <div style="color:#94a3b8;font-size:0.9rem;">
            <i class="fa fa-calendar"></i> {{ page.date | date: "%Y-%m-%d" }}
            {% for tag in page.tags %}
            <span style="background:rgba(79,70,229,0.10);color:#4f46e5;padding:0 10px;border-radius:20px;font-size:0.7rem;line-height:1.8;margin-left:4px;"><i class="fa fa-tag"></i> {{ tag }}</span>
            {% endfor %}
        </div>
    </div>

    <div style="line-height:1.9;font-size:1.05rem;color:#334155;">
        {{ content }}
    </div>

    <a href="/blog/" class="link-underline" style="display:inline-block;margin-top:2.5rem;color:#4f46e5;text-decoration:none;"><i class="fa fa-arrow-left"></i> 返回博客列表</a>
</div>
