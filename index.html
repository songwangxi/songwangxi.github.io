<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的网站 - 主页</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📄</text></svg>">
    <link rel="stylesheet" href="/common.css">
    <link rel="stylesheet" href="https://cdn.staticfile.org/font-awesome/4.7.0/css/font-awesome.css">
</head>
<body>

    <!-- ========== 顶部导航栏 ========== -->
    <script src="/navbar.js"></script>

    <!-- ========== 主页内容 ========== -->
    <div class="container">
        <button id="gradientToggle" class="toggle-btn" color1="#7c3aed" color2="#a78bfa">关闭文字渐变</button>
        <button id="underlineToggle" class="toggle-btn" color1="#ea580c" color2="#f97316">关闭下划线渐变</button>
        <button id="buttonGradientToggle" class="toggle-btn" color1="#10b981" color2="#34d399">关闭按钮渐变</button>

        <h1><span class="gradient" color1="#1e3a8a" color2="#60a5fa">欢迎来到我的网站</span></h1>
        <p>点击按钮可统一开关所有渐变。导航栏可切换到分享留言页面。</p>

        <h2><span class="gradient" color1="#4f46e5" color2="#a78bfa">自定义卡片与链接</span></h2>
        <div class="card-grid stretch">
            <div class="card">
                <h3><span class="gradient" color1="#ff0000" color2="#ff8800">红橙渐变卡片</span></h3>
                <p>链接下划线也会是红橙渐变。</p>
                <a href="#" class="link-underline" color1="#ff0000" color2="#ff8800">了解详情 →</a>
            </div>
            <div class="card">
                <h3><span class="gradient" color1="#00aa55" color2="#00ddcc">绿青渐变卡片</span></h3>
                <p>链接下划线也会是绿青渐变。</p>
                <a href="#" class="link-underline" color1="#00aa55" color2="#00ddcc">查看示例 →</a>
            </div>
            <div class="card">
                <h3><span class="gradient" color1="#8800aa" color2="#ff44aa">紫粉渐变卡片</span></h3>
                <p>链接下划线也会是紫粉渐变。</p>
                <a href="#" class="link-underline" color1="#8800aa" color2="#ff44aa">了解更多 →</a>
            </div>
        </div>

        <h2>默认渐变链接</h2>
        <div class="card-grid left">
            <div class="card wide">
                <h3><span class="gradient">使用默认渐变色</span></h3>
                <p>没有写 color1 和 color2，自动使用默认的深蓝到浅蓝。</p>
                <a href="#" class="link-underline">这是一个默认链接 →</a>
            </div>
        </div>
        <!-- 从左滑入，距离 100px -->
<div class="card card-animate" data-tx="-100">大幅度左滑</div>

<!-- 从右滑入，距离 60px + 缩放 -->
<div class="card card-animate" data-tx="60" data-sc="0.85">右滑 + 缩放</div>

<!-- 从下方滑入，距离 50px + 缩放 + 快速区间 -->
<div class="card card-animate" data-tx="-1000" data-start="0.3" data-end="0.2">组合使用</div>
        <div class="card card-tilt">
            <h3>鼠标放上来试试</h3>
            <p>卡片会朝鼠标方向倾斜。</p>
        </div>
        <div style="height: 1500px;"></div>
    <script src="/common.js"></script>

</body>
</html>
