---
layout: default
title: 首页
---

<div class="container" style="max-width:900px;padding:2rem 1.5rem;">
    <div style="text-align:center;margin-bottom:2.5rem;">
        <h1><span class="gradient" color1="#1e3a8a" color2="#60a5fa"><i class="fa fa-book"></i> 我的博客</span></h1>
        <p style="color:#64748b;"><i class="fa fa-pencil-square-o"></i> 记录学习与生活的点滴</p>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.5rem;">
        {% for post in site.posts %}
        <div class="card card-tilt" style="padding:1.5rem 1.8rem;">
            <h3>
                <a href="{{ post.url | relative_url }}" class="post-title">{{ post.title }}</a>
            </h3>
            <p style="color:#475569;font-size:0.9rem;margin:0.5rem 0;">{{ post.excerpt | strip_html | truncatewords: 30 }}</p>
            <div style="display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(0,0,0,0.05);padding-top:0.8rem;margin-top:0.3rem;">
                <span style="color:#94a3b8;font-size:0.8rem;"><i class="fa fa-calendar"></i> {{ post.date | date: "%Y-%m-%d" }}</span>
                <div>
                    {% for tag in post.tags %}
                    <span style="background:rgba(79,70,229,0.10);color:#4f46e5;padding:0 10px;border-radius:20px;font-size:0.7rem;line-height:1.8;"><i class="fa fa-tag"></i> {{ tag }}</span>
                    {% endfor %}
                </div>
            </div>
            <div style="margin-top:0.6rem;text-align:right;">
                <a href="{{ post.url }}" class="link-underline" style="color:#4f46e5;font-size:0.85rem;font-weight:500;">阅读全文 <i class="fa fa-arrow-right"></i></a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
