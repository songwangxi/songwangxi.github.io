<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的网站 - 主页</title>
    <style>
        /* ========== 全局样式 ========== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif;
            line-height: 1.7;
            color: #334155;
            background-color: #f0f9ff;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        img, picture, video, canvas, svg { display: block; max-width: 100%; height: auto; }
        input, button, textarea, select { font: inherit; color: inherit; }
        p { margin-bottom: 1rem; }
        ul, ol { list-style: none; }
        .container { width: 100%; max-width: 1000px; margin: 0 auto; padding: 2rem; }

        /* ========== 顶部导航栏 ========== */
        .navbar {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .navbar .logo {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1e293b;
            text-decoration: none;
        }
        .navbar .nav-links { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .navbar .nav-links a {
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 500;
            color: #64748b;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }
        .navbar .nav-links a:hover { background: #f1f5f9; color: #1e293b; }
        .navbar .nav-links a.active { background: #4f46e5; color: #fff; }

        /* ========== 标题样式 ========== */
        h1, h2, h3, h4, h5 { line-height: 1.3; font-weight: 700; color: #1e293b; margin-bottom: 0.5rem; }
        h1 { font-size: 2.5rem; }
        h2 { font-size: 1.8rem; margin-top: 2rem; }
        h3 { font-size: 1.5rem; }

        /* ========== 渐变文字类 ========== */
        .gradient {
            background: linear-gradient(135deg, #1e3a8a 0%, #60a5fa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }
        body.no-gradient .gradient {
            background: none !important;
            -webkit-text-fill-color: #1e293b !important;
            color: #1e293b !important;
        }
        /* 单独关闭下划线渐变 */
        body.no-underline .link-underline::after {
            background: #4f46e5 !important;
        }

        /* ========== 开关按钮 ========== */
        .toggle-btn {
            display: inline-block;
            padding: 0.6rem 1.8rem;
            background: #4f46e5;
            color: #fff;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 1rem;
            transition: background 0.2s ease;
        }
        .toggle-btn:hover { 
            background: #4338ca; 
        }
        .toggle-btn.active {
            background: #94a3b8;
        }
        /* ========== 卡片网格 ========== */
        .card-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
            margin-top: 1rem;
        }
        .card-grid.left { 
            justify-content: flex-start; 
        }
        .card-grid.stretch .card {
            flex: 1 1 0;   /* 让每张卡片平均分配可用空间 */
            min-width: 250px; /* 保证卡片不会太窄 */
        }
        /* ========== 卡片样式 ========== */
        .card {
            background: #ffffff;
            border-radius: 12px;
            padding: 1.8rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.04);
            transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            flex: 0 1 300px;
        }
        .card:hover {
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            transform: translateY(-4px);
        }
        .card.wide {
            flex-basis: 100%;
        }

        /* ========== 链接下划线特效 ========== */
        .link-underline {
            position: relative;
            text-decoration: none;
            color: #4f46e5;
            font-weight: 500;
            padding-bottom: 2px;
        }
        .link-underline::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: #4f46e5;
            transition: width 0.3s ease-in-out;
        }
        .link-underline:hover::after { width: 100%; }
    </style>
</head>
<body>

    <!-- ========== 顶部导航栏 ========== -->
    <nav class="navbar">
        <a href="/" class="logo">✨ 我的网站</a>
        <div class="nav-links">
            <a href="/" class="active">🏠 主页</a>
            <a href="/share">📤 分享留言</a>
        </div>
    </nav>

    <!-- ========== 主页内容 ========== -->
    <div class="container">
        <button id="gradientToggle" class="toggle-btn">🎨 关闭文字渐变</button>
        <button id="underlineToggle" class="toggle-btn">📏 关闭下划线渐变</button>

        <h1>👋 <span class="gradient" color1="#1e3a8a" color2="#60a5fa">欢迎来到我的网站</span></h1>
        <p>点击按钮可统一开关所有渐变。导航栏可切换到分享留言页面。</p>

        <h2><span class="gradient" color1="#4f46e5" color2="#a78bfa">自定义卡片与链接</span></h2>
        <div class="card-grid stretch">
            <div class="card">
                <h3><span class="gradient" color1="#ff0000" color2="#ff8800">红橙渐变卡片</span></h3>
                <p>链接下划线也会是红橙渐变。</p>
                <a href="#" class="link-underline" color1="#ff0000" color2="#ff8800">了解详情 →</a>
            </div>
            <div class="card">
                <h3><span class="gradient" color1="#00aa55" color2="#00ddcc">绿青渐变卡片</span></h3>
                <p>链接下划线也会是绿青渐变。</p>
                <a href="#" class="link-underline" color1="#00aa55" color2="#00ddcc">查看示例 →</a>
            </div>
            <div class="card">
                <h3><span class="gradient" color1="#8800aa" color2="#ff44aa">紫粉渐变卡片</span></h3>
                <p>链接下划线也会是紫粉渐变。</p>
                <a href="#" class="link-underline" color1="#8800aa" color2="#ff44aa">了解更多 →</a>
            </div>
        </div>

        <h2>默认渐变链接</h2>
        <div class="card-grid left">
            <div class="card wide">
                <h3><span class="gradient">使用默认渐变色</span></h3>
                <p>没有写 color1 和 color2，自动使用默认的深蓝到浅蓝。</p>
                <a href="#" class="link-underline">这是一个默认链接 →</a>
            </div>
        </div>
    </div>
<script>
    // ========== 1. 自定义渐变色 ==========
    function applyCustomGradients() {
        document.querySelectorAll('.gradient').forEach(el => {
            const color1 = el.getAttribute('color1');
            const color2 = el.getAttribute('color2');
            if (color1 && color2) {
                el.style.background = `linear-gradient(135deg, ${color1} 0%, ${color2} 100%)`;
                el.style.webkitBackgroundClip = 'text';
                el.style.backgroundClip = 'text';
                el.style.webkitTextFillColor = 'transparent';
                el.style.color = 'transparent';
            }
        });

        document.querySelectorAll('.link-underline').forEach(link => {
            const color1 = link.getAttribute('color1');
            const color2 = link.getAttribute('color2');
            if (color1 && color2) {
                link.style.setProperty('--underline-color1', color1);
                link.style.setProperty('--underline-color2', color2);
                link.classList.add('custom-underline');
            }
        });

        if (!document.getElementById('dynamic-underline-style')) {
            const styleTag = document.createElement('style');
            styleTag.id = 'dynamic-underline-style';
            styleTag.textContent = `.link-underline.custom-underline::after { background: linear-gradient(135deg, var(--underline-color1) 0%, var(--underline-color2) 100%) !important; }`;
            document.head.appendChild(styleTag);
        }
    }

    // ========== 2. 同步偏好设置到其他页面 ==========
    function syncPreferences() {
        const state = {
            gradient: body.classList.contains('no-gradient') ? 'off' : 'on',
            underline: body.classList.contains('no-underline') ? 'off' : 'on'
        };
        localStorage.setItem('gradientPreference', state.gradient);
        localStorage.setItem('underlinePreference', state.underline);
    }

    // ========== 3. 文字渐变开关 ==========
    const gradientToggle = document.getElementById('gradientToggle');
    const body = document.body;

    function loadGradientPreference() {
        const saved = localStorage.getItem('gradientPreference');
        if (saved === 'off') {
            body.classList.add('no-gradient');
            gradientToggle.textContent = '✨ 开启文字渐变';
            gradientToggle.classList.add('active');
        } else {
            body.classList.remove('no-gradient');
            gradientToggle.textContent = '🎨 关闭文字渐变';
            gradientToggle.classList.remove('active');
        }
    }

    gradientToggle.addEventListener('click', () => {
        body.classList.toggle('no-gradient');
        if (body.classList.contains('no-gradient')) {
            gradientToggle.textContent = '✨ 开启文字渐变';
            gradientToggle.classList.add('active');
        } else {
            gradientToggle.textContent = '🎨 关闭文字渐变';
            gradientToggle.classList.remove('active');
        }
        syncPreferences();
    });

    // ========== 4. 下划线渐变开关 ==========
    const underlineToggle = document.getElementById('underlineToggle');

    function loadUnderlinePreference() {
        const saved = localStorage.getItem('underlinePreference');
        if (saved === 'off') {
            body.classList.add('no-underline');
            underlineToggle.textContent = '✨ 开启下划线渐变';
            underlineToggle.classList.add('active');
        } else {
            body.classList.remove('no-underline');
            underlineToggle.textContent = '📏 关闭下划线渐变';
            underlineToggle.classList.remove('active');
        }
    }

    underlineToggle.addEventListener('click', () => {
        body.classList.toggle('no-underline');
        if (body.classList.contains('no-underline')) {
            underlineToggle.textContent = '✨ 开启下划线渐变';
            underlineToggle.classList.add('active');
        } else {
            underlineToggle.textContent = '📏 关闭下划线渐变';
            underlineToggle.classList.remove('active');
        }
        syncPreferences();
    });

    // ========== 5. 导航栏高亮当前页面 ==========
    document.querySelectorAll('.nav-links a').forEach(link => {
        if (link.getAttribute('href') === window.location.pathname) {
            link.classList.add('active');
        }
    });

    // ========== 初始化 ==========
    window.addEventListener('DOMContentLoaded', () => {
        applyCustomGradients();
        loadGradientPreference();
        loadUnderlinePreference();
    });
</script>

</body>
</html>
