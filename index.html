<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的网站</title>
    <style>
        /* ========== 现代化全局CSS样式 ========== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif;
            line-height: 1.7;
            color: #334155;
            background-color: #f0f9ff;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            padding: 2rem;
        }
        img, picture, video, canvas, svg { display: block; max-width: 100%; height: auto; }
        a { color: #4f46e5; text-decoration: none; transition: color 0.2s ease; }
        a:hover { color: #4338ca; }
        p { margin-bottom: 1rem; }
        .container { width: 100%; max-width: 800px; margin: 0 auto; }

        /* 标题基础样式 */
        h1, h2, h3, h4, h5 {
            line-height: 1.3;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }
        h1 { font-size: 2.5rem; }
        h2 { font-size: 1.8rem; margin-top: 2rem; }
        h3 { font-size: 1.5rem; }

        /* 渐变文字类 */
        .gradient {
            background: linear-gradient(135deg, #1e3a8a 0%, #60a5fa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        /* 卡片网格 */
        .card-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .card {
            background: #ffffff;
            border-radius: 12px;
            padding: 1.8rem;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 4px 16px rgba(0, 0, 0, 0.04);
            transition: all 0.35s;
            flex: 0 1 300px;
        }
        .card:hover {
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            transform: translateY(-4px);
        }

        /* 链接下划线特效 */
        .link-underline {
            position: relative;
            text-decoration: none;
            color: #4f46e5;
            font-weight: 500;
        }
        .link-underline::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background-color: #4f46e5;
            transition: width 0.3s;
        }
        .link-underline:hover::after { width: 100%; }

        /* 开关按钮 */
        .toggle-btn {
            display: inline-block;
            padding: 0.6rem 1.8rem;
            background: #4f46e5;
            color: #fff;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 1rem;
            transition: background 0.2s;
        }
        .toggle-btn:hover { background: #4338ca; }

        /* 关闭渐变时的标题样式 */
        body.no-gradient h1 .gradient,
        body.no-gradient h2 .gradient,
        body.no-gradient h3 .gradient,
        body.no-gradient h4 .gradient,
        body.no-gradient h5 .gradient {
            background: none;
            -webkit-text-fill-color: #1e293b;
            color: #1e293b;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>👋 <span class="gradient">偏好保存演示</span></h1>
        <button id="gradientToggle" class="toggle-btn">🎨 关闭渐变</button>

        <h2><span class="gradient">卡片区域</span></h2>
        <div class="card-grid">
            <div class="card">
                <h3><span class="gradient">卡片一</span></h3>
                <p>你的渐变偏好会被浏览器记住。</p>
                <a href="#" class="link-underline">了解详情 →</a>
            </div>
            <div class="card">
                <h3><span class="gradient">卡片二</span></h3>
                <p>刷新页面或下次打开，设置依然生效。</p>
                <a href="#" class="link-underline">查看示例 →</a>
            </div>
        </div>
    </div>

    <script>
        const toggleBtn = document.getElementById('gradientToggle');
        const body = document.body;

        // 页面加载时，读取保存的偏好
        function loadPreference() {
            const saved = localStorage.getItem('gradientPreference');
            if (saved === 'off') {
                body.classList.add('no-gradient');
                toggleBtn.textContent = '✨ 开启渐变';
            } else {
                body.classList.remove('no-gradient');
                toggleBtn.textContent = '🎨 关闭渐变';
            }
        }

        // 点击按钮时，切换状态并保存
        toggleBtn.addEventListener('click', () => {
            body.classList.toggle('no-gradient');

            if (body.classList.contains('no-gradient')) {
                toggleBtn.textContent = '✨ 开启渐变';
                localStorage.setItem('gradientPreference', 'off'); // 保存“关闭”状态
            } else {
                toggleBtn.textContent = '🎨 关闭渐变';
                localStorage.setItem('gradientPreference', 'on'); // 保存“开启”状态
            }
        });

        // 初始化
        loadPreference();
    </script>

</body>
</html>
