<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的网站 - 分享留言</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📄</text></svg>">
    <link rel="stylesheet" href="/common.css">
    <link rel="stylesheet" href="https://cdn.staticfile.org/font-awesome/4.7.0/css/font-awesome.css">
</head>
<body>

    <!-- ========== 顶部导航栏 ========== -->
    <nav class="navbar">
        <a href="/" class="logo">我的网站</a>
        <div class="nav-links">
            <a href="/"><i class="fa fa-home"></i> 主页</a>
            <a href="/share/"><i class="fa fa-share-alt"></i> 分享留言</a>
            <a href="https://你的论坛名.freeflarum.com"><i class="fa fa-comments"></i> 论坛</a>
    </div>
    </nav>

    <div class="container">
        <h1><span class="gradient" color1="#1e3a8a" color2="#60a5fa">手动分享留言</span></h1>
        <p>在这里写留言，生成链接发给朋友，朋友打开就能看到。</p>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="写下你想分享的内容..." />
            <button id="shareBtn" class="toggle-btn" color1="#8b5cf6" color2="#ec4899">生成分享链接</button>
        </div>
        <div id="shareArea" class="card hidden">
            <h3>你的分享链接</h3>
            <p>复制下面的链接，发给你的朋友：</p>
            <div id="shareLink" class="share-link-box"></div>
            <button id="copyBtn" class="toggle-btn" color1="#34d399" color2="#059669">复制链接</button>
        </div>

        <div class="card">
            <h3>收到的留言</h3>
            <ul id="messageList" class="message-list">
                <li>还没有收到任何留言。</li>
            </ul>
        </div>
    </div>

    <script src="/common.js"></script>

</body>
</html>
