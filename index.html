<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的网站 - 手动分享版</title>
    <style>
        /* 保留了之前所有现代化样式 */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif;
            line-height: 1.7;
            color: #334155;
            background-color: #f0f9ff;
            min-height: 100vh;
            padding: 2rem;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1, h2, h3 { line-height: 1.3; font-weight: 700; color: #1e293b; margin-bottom: 0.5rem; }
        h1 { font-size: 2.5rem; }
        
        .gradient {
            background: linear-gradient(135deg, #1e3a8a 0%, #60a5fa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            margin: 2rem 0;
            box-shadow: 0 20px 40px rgba(0,0,0,0.03), 0 1px 3px rgba(0,0,0,0.02);
        }

        .input-area {
            display: flex;
            gap: 12px;
            margin: 1.5rem 0;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            background: #fff;
            transition: all 0.2s ease;
        }
        .input-area input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        .input-area button {
            padding: 12px 24px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .input-area button:hover { background: #4338ca; }

        .message-list {
            list-style: none;
            padding: 0;
        }
        .message-list li {
            background: #f8fafc;
            margin-bottom: 0.8rem;
            padding: 14px 18px;
            border-radius: 10px;
            font-size: 1rem;
            color: #334155;
        }

        .share-link-box {
            background: #f1f5f9;
            padding: 1rem;
            border-radius: 8px;
            word-break: break-all;
            font-family: monospace;
            font-size: 0.9rem;
            margin: 1rem 0;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>👋 <span class="gradient">手动分享留言</span></h1>
    <p>在这里写留言，然后生成一个链接发给朋友。朋友打开链接就能看到你的留言。</p>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="写下你想分享的内容..." />
        <button id="shareBtn">生成分享链接</button>
    </div>

    <!-- 生成的分享链接会显示在这里 -->
    <div id="shareArea" class="card hidden">
        <h3>🔗 你的分享链接</h3>
        <p>复制下面的链接，发给你的朋友：</p>
        <div id="shareLink" class="share-link-box"></div>
        <button id="copyBtn" style="margin-top:0.5rem; padding:8px 16px; background:#10b981; color:white; border:none; border-radius:8px; cursor:pointer;">复制链接</button>
    </div>

    <!-- 展示从链接加载的留言 -->
    <div class="card">
        <h3>📋 收到的留言</h3>
        <ul id="messageList" class="message-list">
            <li>还没有收到任何留言。</li>
        </ul>
    </div>
</div>

<script>
    const messageInput = document.getElementById('messageInput');
    const shareBtn = document.getElementById('shareBtn');
    const shareArea = document.getElementById('shareArea');
    const shareLink = document.getElementById('shareLink');
    const copyBtn = document.getElementById('copyBtn');
    const messageList = document.getElementById('messageList');

    // 生成分享链接
    shareBtn.addEventListener('click', () => {
        const text = messageInput.value.trim();
        if (!text) return alert('请先输入内容！');

        // 将留言内容用 Base64 编码，并添加到当前网址后面
        const encodedText = btoa(unescape(encodeURIComponent(text)));
        const currentUrl = window.location.href.split('?')[0]; // 移除已有的查询参数
        const shareUrl = `${currentUrl}?msg=${encodedText}`;
        
        shareLink.textContent = shareUrl;
        shareArea.classList.remove('hidden');
    });

    // 复制链接
    copyBtn.addEventListener('click', () => {
        const range = document.createRange();
        range.selectNode(shareLink);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
        alert('链接已复制！');
    });

    // 页面加载时，检查网址里有没有留言
    function loadSharedMessage() {
        const urlParams = new URLSearchParams(window.location.search);
        const encodedMsg = urlParams.get('msg');
        
        if (encodedMsg) {
            try {
                const decodedText = decodeURIComponent(escape(atob(encodedMsg)));
                messageList.innerHTML = `<li>${escapeHtml(decodedText)}</li>`;
            } catch (e) {
                messageList.innerHTML = '<li>链接中的留言无法解析。</li>';
            }
        } else {
            messageList.innerHTML = '<li>还没有收到任何留言。</li>';
        }
    }

    // 安全过滤
    function escapeHtml(text) {
        return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // 页面加载时执行
    loadSharedMessage();
</script>

</body>
</html>
