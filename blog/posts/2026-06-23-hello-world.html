<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章加载中...</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
</head>
<body>
    <!-- 直接加载模板，通过 URL 参数传递文章数据 -->
    <script>
        // ========== 文章数据 ==========
        const articleData = {
            title: "Hello World！我的第一篇博客",
            date: "2026-06-23",
            tags: "生活, 随想",
            content: `
                <h2>终于开始了！</h2>
                <p>你好！这是我的第一篇博客文章。</p>
                <p>用 <strong>GitHub Pages</strong> 搭建这个博客，比我想象中要简单很多。</p>

                <blockquote>
                    <p>"千里之行，始于足下。" —— 老子</p>
                </blockquote>

                <h2>为什么选择 GitHub Pages？</h2>
                <ul>
                    <li><strong>完全免费</strong> —— 无需任何费用</li>
                    <li><strong>支持自定义域名</strong> —— 可以用自己的域名</li>
                    <li><strong>Markdown 写作</strong> —— 专注内容，无需关心排版</li>
                    <li><strong>版本控制</strong> —— 每次修改都有记录</li>
                    <li><strong>全球加速</strong> —— GitHub 的 CDN 让访问更快</li>
                </ul>

                <h2>代码高亮示例</h2>
                <p>行内代码：<code>console.log('Hello World!')</code></p>

                <pre data-lang="javascript"><code>function greet(name) {
                    return \`Hello, \${name}!\`;
                }

                const message = greet('GitHub Pages');
                console.log(message);</code></pre>

                <h2>图片示例</h2>
                <img src="https://picsum.photos/800/400?random=1" alt="随机图片">
                <em>图片来自 picsum.photos</em>

                <h2>链接示例</h2>
                <p>访问 <a href="https://github.com">GitHub 官网</a> 了解更多。</p>

                <h2>表格示例</h2>
                <table>
                    <thead>
                        <tr><th>功能</th><th>是否支持</th><th>备注</th></tr>
                    </thead>
                    <tbody>
                        <tr><td>标题</td><td>✅ 支持</td><td>h1 ~ h6</td></tr>
                        <tr><td>代码高亮</td><td>✅ 支持</td><td>行内 + 代码块</td></tr>
                        <tr><td>图片</td><td>✅ 支持</td><td>响应式 + 圆角</td></tr>
                    </tbody>
                </table>

                <hr>

                <p>接下来我会在这里分享更多学习笔记和生活感悟，敬请期待！</p>
            `
        };

        // ========== 跳转到模板页 ==========
        const params = new URLSearchParams({
            title: articleData.title,
            date: articleData.date,
            tags: articleData.tags,
            content: articleData.content
        });

        // 替换为模板页地址
        window.location.href = '/blog/template.html?' + params.toString();
    </script>
</body>
</html>
