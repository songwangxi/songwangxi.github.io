<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的网站</title>
    <style>
        /* ========== 1. 现代化全局CSS样式 ========== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif;
            line-height: 1.7;
            color: #334155;
            background-color: #e0f2fe; /* 全局淡蓝色背景 */
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            padding: 2rem;
        }
        img, picture, video, canvas, svg { display: block; max-width: 100%; height: auto; }
        input, button, textarea, select { font: inherit; color: inherit; }
        a { color: #4f46e5; text-decoration: none; transition: color 0.2s ease; }
        a:hover { color: #4338ca; }
        h1, h2, h3, h4, h5, h6 { line-height: 1.3; font-weight: 600; }
        p { margin-bottom: 1rem; }
        ul, ol { list-style: none; }
        .container { width: 100%; max-width: 800px; margin: 0 auto; }
        .text-center { text-align: center; }

        /* 标题渐变色：从黑色渐变到深蓝色 */
        h1 {
    font-size: 2.5rem;
    font-weight: 700;
    background: linear-gradient(135deg, #000000 0%, #1e3a8a 100%);
    background-clip: text !important;
    -webkit-background-clip: text !important;
    color: transparent !important;
    -webkit-text-fill-color: transparent !important;
    margin-bottom: 0.5rem;
}

h2 {
    font-size: 1.8rem;
    font-weight: 700;
    background: linear-gradient(135deg, #000000 0%, #1e3a8a 100%);
    background-clip: text !important;
    -webkit-background-clip: text !important;
    color: transparent !important;
    -webkit-text-fill-color: transparent !important;
}
        h3 { font-size: 1.4rem; color: #1e293b; } /* h3 保持深色，适合卡片内标题 */

        /* ========== 2. 卡片阴影样式 ========== */
        .card {
            background: #ffffff;
            border-radius: 12px;
            padding: 1.8rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 4px 16px rgba(0, 0, 0, 0.04);
            transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .card:hover {
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08), 0 2px 6px rgba(0, 0, 0, 0.04);
            transform: translateY(-4px);
        }

        /* ========== 3. 链接下划线展开特效（无原有下划线） ========== */
        .link-underline {
            position: relative;
            text-decoration: none;
            color: #4f46e5;
            font-weight: 500;
            padding-bottom: 2px;
        }
        .link-underline::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background-color: #4f46e5;
            transition: width 0.3s ease-in-out;
        }
        .link-underline:hover::after { width: 100%; }
    </style>
</head>
<body>

    <div class="container">
        <h1>👋 欢迎来到我的网站</h1>
        <p>标题带有黑到深蓝的渐变，背景是舒适的淡蓝色。</p>

        <div class="card">
            <h3>关于这个模板</h3>
            <p>柔和阴影的卡片，悬停时上浮。</p>
            <a href="#" class="link-underline">了解详情 →</a>
        </div>

        <div class="card">
            <h3>链接特效</h3>
            <p>下面链接悬停时，下划线从中间向两边展开。</p>
            <a href="#" class="link-underline">这是一个示范链接</a>
        </div>
    </div>

</body>
</html>
