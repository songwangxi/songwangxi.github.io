---
layout: post
title: 文章分类
permalink: /categories/
---



  {% assign tags = site.tags | sort %}
  {% if tags.size > 0 %}
    {% for tag in tags %}
      <div style="margin-bottom:2.5rem;">
        <h2 style="font-size:1.4rem;margin-bottom:1rem;color:#1e293b;border-bottom:2px solid #4f46e5;padding-bottom:0.3rem;">
          <i class="fa fa-tag" style="color:#4f46e5;"></i> {{ tag[0] }}
        </h2>
        <div class="card-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.2rem;">
          {% for post in tag[1] %}
            <div class="card card-tilt" style="padding:1.2rem 1.5rem;">
              <a href="{{ post.url | relative_url }}" class="link-underline">{{ post.title }}</a>
              <span class="post-date">{{ post.date | date: "%Y-%m-%d" }}</span>
            </div>
          {% endfor %}
        </div>
      </div>
    {% endfor %}
  {% else %}
    <p class="post-date">还没有文章，马上写第一篇！</p>
  {% endif %}
</div>
