<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的网站 - 完整版</title>
    <style>
        /* ========== 1. 现代化全局CSS样式 ========== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif;
            line-height: 1.7;
            color: #334155;
            background-color: #f0f9ff; /* 淡蓝色背景 */
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            padding: 2rem;
        }
        img, picture, video, canvas, svg { display: block; max-width: 100%; height: auto; }
        input, button, textarea, select { font: inherit; color: inherit; }
        a { color: #4f46e5; text-decoration: none; transition: color 0.2s ease; }
        a:hover { color: #4338ca; }
        p { margin-bottom: 1rem; }
        ul, ol { list-style: none; }
        .container { width: 100%; max-width: 1000px; margin: 0 auto; }

        /* ========== 标题基础样式 ========== */
        h1, h2, h3, h4, h5 {
            line-height: 1.3;
            font-weight: 700;
            color: #1e293b; /* 默认深色 */
            margin-bottom: 0.5rem;
        }
        h1 { font-size: 2.5rem; }
        h2 { font-size: 1.8rem; margin-top: 2rem; }
        h3 { font-size: 1.5rem; }
        h4 { font-size: 1.3rem; }
        h5 { font-size: 1.1rem; }

        /* ========== 渐变文字类（默认深蓝→浅蓝） ========== */
        .gradient {
            background: linear-gradient(135deg, #1e3a8a 0%, #60a5fa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        /* 关闭渐变状态下的标题恢复纯色 */
        body.no-gradient .gradient {
            background: none !important;
            -webkit-text-fill-color: #1e293b !important;
            color: #1e293b !important;
        }

        /* ========== 开关按钮样式 ========== */
        .toggle-btn {
            display: inline-block;
            padding: 0.6rem 1.8rem;
            background: #4f46e5;
            color: #fff;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 1rem;
            transition: background 0.2s ease;
        }
        .toggle-btn:hover { background: #4338ca; }

        /* ========== 卡片网格容器 ========== */
        .card-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
            margin-top: 1rem;
        }
        /* 对齐修饰类 */
        .card-grid.left { justify-content: flex-start; }
        .card-grid.right { justify-content: flex-end; }

        /* ========== 卡片样式 ========== */
        .card {
            background: #ffffff;
            border-radius: 12px;
            padding: 1.8rem;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 4px 16px rgba(0, 0, 0, 0.04);
            transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            flex: 0 1 300px; /* 基础宽度 */
        }
        .card:hover {
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08), 0 2px 6px rgba(0, 0, 0, 0.04);
            transform: translateY(-4px);
        }
        /* 卡片宽度修饰类 */
        .card.wide { flex-basis: 100%; }
        .card.narrow { flex-basis: 200px; }

        /* ========== 链接下划线展开特效 ========== */
        .link-underline {
            position: relative;
            text-decoration: none;
            color: #4f46e5;
            font-weight: 500;
            padding-bottom: 2px;
        }
        .link-underline::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background-color: #4f46e5;
            transition: width 0.3s ease-in-out;
        }
        .link-underline:hover::after { width: 100%; }
    </style>
</head>
<body>

    <div class="container">
        <!-- 渐变开关按钮 -->
        <button id="gradientToggle" class="toggle-btn">🎨 关闭渐变</button>

        <!-- 标题示例：使用 color1 和 color2 自定义渐变 -->
        <h1>👋 <span class="gradient" color1="#1e3a8a" color2="#60a5fa">欢迎来到我的网站</span></h1>
        <p>点击按钮可统一开关所有渐变。下面演示了不同自定义颜色的渐变标题。</p>

        <!-- 卡片展示区 -->
        <h2><span class="gradient" color1="#4f46e5" color2="#a78bfa">自定义卡片位置</span></h2>
        <div class="card-grid">
            <!-- 卡片1：红→橙渐变 -->
            <div class="card">
                <h3><span class="gradient" color1="#ff0000" color2="#ff8800">红橙渐变卡片</span></h3>
                <p>使用 color1="#ff0000" color2="#ff8800"</p>
                <a href="#" class="link-underline">了解详情 →</a>
            </div>
            <!-- 卡片2：绿→青渐变 -->
            <div class="card">
                <h3><span class="gradient" color1="#00aa55" color2="#00ddcc">绿青渐变卡片</span></h3>
                <p>使用 color1="#00aa55" color2="#00ddcc"</p>
                <a href="#" class="link-underline">查看示例 →</a>
            </div>
            <!-- 卡片3：紫→粉渐变 -->
            <div class="card">
                <h3><span class="gradient" color1="#8800aa" color2="#ff44aa">紫粉渐变卡片</span></h3>
                <p>使用 color1="#8800aa" color2="#ff44aa"</p>
                <a href="#" class="link-underline">了解更多 →</a>
            </div>
        </div>

        <!-- 默认渐变示例（不写 color1 color2） -->
        <h2>默认渐变标题</h2>
        <div class="card-grid left">
            <div class="card wide">
                <h3><span class="gradient">使用默认渐变色（深蓝→浅蓝）</span></h3>
                <p>没有写 color1 和 color2 属性，自动使用 CSS 默认值。</p>
            </div>
        </div>
    </div>

    <script>
        // ========== 1. 处理自定义渐变色 ==========
        function applyCustomGradients() {
            const gradientEls = document.querySelectorAll('.gradient');
            gradientEls.forEach(el => {
                const color1 = el.getAttribute('color1');
                const color2 = el.getAttribute('color2');
                if (color1 && color2) {
                    el.style.background = `linear-gradient(135deg, ${color1} 0%, ${color2} 100%)`;
                    el.style.webkitBackgroundClip = 'text';
                    el.style.backgroundClip = 'text';
                    el.style.webkitTextFillColor = 'transparent';
                    el.style.color = 'transparent';
                }
            });
        }

        // ========== 2. 渐变开关逻辑（含 localStorage） ==========
        const toggleBtn = document.getElementById('gradientToggle');
        const body = document.body;

        function loadPreference() {
            const saved = localStorage.getItem('gradientPreference');
            if (saved === 'off') {
                body.classList.add('no-gradient');
                toggleBtn.textContent = '✨ 开启渐变';
            } else {
                body.classList.remove('no-gradient');
                toggleBtn.textContent = '🎨 关闭渐变';
            }
        }

        toggleBtn.addEventListener('click', () => {
            body.classList.toggle('no-gradient');
            if (body.classList.contains('no-gradient')) {
                toggleBtn.textContent = '✨ 开启渐变';
                localStorage.setItem('gradientPreference', 'off');
            } else {
                toggleBtn.textContent = '🎨 关闭渐变';
                localStorage.setItem('gradientPreference', 'on');
            }
        });

        // ========== 初始化 ==========
        window.addEventListener('DOMContentLoaded', () => {
            applyCustomGradients();
            loadPreference();
        });
    </script>

</body>
</html>
